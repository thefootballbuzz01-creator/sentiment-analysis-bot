name: Hourly sentiment refresh

# Runs the bot every hour on GitHub's servers (no laptop needed) and
# publishes report.html to GitHub Pages. No API keys required.

on:
  schedule:
    - cron: "0 * * * *"      # every hour, on the hour (UTC)
  workflow_dispatch:           # lets you run it manually from the Actions tab
  push:
    branches: [main]           # also rebuild whenever you push changes

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer runs supersede older queued ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the sentiment bot
        run: python bot.py --scheduled

      - name: Prepare the site
        run: |
          mkdir -p _site
          cp report.html _site/index.html

      - name: Upload the page
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Send email notification
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python send_notification.py
